<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SERPENT — Neon Noir</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --neon-cyan: #00f5ff;
    --neon-magenta: #ff00aa;
    --neon-purple: #8b5cf6;
    --dark-bg: #06060e;
    --dark-surface: #0d0d1a;
    --dark-card: rgba(13, 13, 26, 0.7);
    --glass: rgba(255, 255, 255, 0.03);
    --glass-border: rgba(255, 255, 255, 0.06);
    --text-primary: #e8e8f0;
    --text-muted: rgba(232, 232, 240, 0.4);
    --grid-line: rgba(0, 245, 255, 0.04);
    --cell: 18px;
  }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--dark-bg);
    color: var(--text-primary);
    font-family: 'JetBrains Mono', monospace;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
  }

  .bg-gradient {
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 50% 0%, rgba(0, 245, 255, 0.07) 0%, transparent 60%),
      radial-gradient(ellipse 50% 50% at 80% 100%, rgba(255, 0, 170, 0.05) 0%, transparent 50%),
      radial-gradient(ellipse 40% 30% at 20% 80%, rgba(139, 92, 246, 0.04) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .noise-overlay {
    position: fixed;
    inset: 0;
    opacity: 0.015;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1;
  }

  .scanlines {
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0, 0, 0, 0.03) 2px,
      rgba(0, 0, 0, 0.03) 4px
    );
    pointer-events: none;
    z-index: 2;
  }

  .app {
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 420px;
    height: 100%;
    display: flex;
    flex-direction: column;
    padding: 16px 16px env(safe-area-inset-bottom, 16px);
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 0 20px;
    opacity: 0;
    animation: fadeSlideDown 0.8s ease-out 0.2s forwards;
  }

  .logo {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: 20px;
    letter-spacing: 6px;
    background: linear-gradient(135deg, var(--neon-cyan), var(--neon-magenta));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: none;
    position: relative;
  }

  .logo-glow {
    position: absolute;
    left: 0; top: 0;
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: 20px;
    letter-spacing: 6px;
    background: linear-gradient(135deg, var(--neon-cyan), var(--neon-magenta));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: blur(12px);
    opacity: 0.5;
    pointer-events: none;
  }

  .header-actions {
    display: flex;
    gap: 12px;
    align-items: center;
  }

  .icon-btn {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    background: var(--glass);
    border: 1px solid var(--glass-border);
    color: var(--text-muted);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.3s ease;
    backdrop-filter: blur(10px);
    font-size: 14px;
  }

  .icon-btn:active {
    transform: scale(0.92);
    background: rgba(0, 245, 255, 0.08);
    border-color: rgba(0, 245, 255, 0.2);
    color: var(--neon-cyan);
  }

  .stats-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    opacity: 0;
    animation: fadeSlideDown 0.8s ease-out 0.35s forwards;
  }

  .stat-card {
    flex: 1;
    padding: 12px 14px;
    border-radius: 14px;
    background: var(--dark-card);
    border: 1px solid var(--glass-border);
    backdrop-filter: blur(20px);
    position: relative;
    overflow: hidden;
  }

  .stat-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(0, 245, 255, 0.3), transparent);
  }

  .stat-card.primary::before {
    background: linear-gradient(90deg, transparent, var(--neon-cyan), transparent);
    box-shadow: 0 0 20px rgba(0, 245, 255, 0.3);
  }

  .stat-label {
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 6px;
  }

  .stat-value {
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    font-size: 22px;
    color: var(--text-primary);
  }

  .stat-card.primary .stat-value {
    background: linear-gradient(135deg, var(--neon-cyan), #00d4ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .game-container {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    animation: fadeScale 1s ease-out 0.5s forwards;
    min-height: 0;
  }

  .game-board-wrapper {
    position: relative;
    padding: 2px;
    border-radius: 20px;
    background: linear-gradient(135deg, rgba(0, 245, 255, 0.15), rgba(255, 0, 170, 0.1), rgba(139, 92, 246, 0.1));
  }

  .game-board-wrapper-glow {
    position: absolute;
    inset: -1px;
    border-radius: 21px;
    background: linear-gradient(135deg, rgba(0, 245, 255, 0.2), transparent, rgba(255, 0, 170, 0.15));
    filter: blur(8px);
    z-index: -1;
  }

  .game-board {
    position: relative;
    width: calc(18 * var(--cell));
    height: calc(18 * var(--cell));
    background: var(--dark-surface);
    border-radius: 18px;
    overflow: hidden;
  }

  .grid-overlay {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(var(--grid-line) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
    background-size: var(--cell) var(--cell);
    pointer-events: none;
  }

  .snake-segment {
    position: absolute;
    width: var(--cell);
    height: var(--cell);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .snake-inner {
    transition: all 0.1s ease;
  }

  .snake-segment.head .snake-inner {
    width: calc(var(--cell) - 3px);
    height: calc(var(--cell) - 3px);
    border-radius: 6px;
    background: linear-gradient(135deg, var(--neon-cyan), #00e5ff);
    box-shadow: 0 0 12px rgba(0, 245, 255, 0.7), 0 0 30px rgba(0, 245, 255, 0.3);
  }

  .snake-segment.body .snake-inner {
    width: calc(var(--cell) - 3px);
    height: calc(var(--cell) - 3px);
    border-radius: 5px;
    background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple));
    opacity: 0.7;
  }

  .snake-segment.tail .snake-inner {
    width: calc(var(--cell) - 6px);
    height: calc(var(--cell) - 6px);
    border-radius: 50%;
    background: var(--neon-purple);
    opacity: 0.4;
  }

  .food {
    position: absolute;
    width: var(--cell);
    height: var(--cell);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .food-inner {
    width: calc(var(--cell) - 5px);
    height: calc(var(--cell) - 5px);
    border-radius: 50%;
    background: var(--neon-magenta);
    box-shadow: 0 0 10px rgba(255, 0, 170, 0.6), 0 0 25px rgba(255, 0, 170, 0.3);
    animation: foodPulse 2s ease-in-out infinite;
  }

  @keyframes foodPulse {
    0%, 100% { transform: scale(1); box-shadow: 0 0 10px rgba(255, 0, 170, 0.6), 0 0 25px rgba(255, 0, 170, 0.3); }
    50% { transform: scale(1.15); box-shadow: 0 0 15px rgba(255, 0, 170, 0.8), 0 0 35px rgba(255, 0, 170, 0.4); }
  }

  .trail {
    position: absolute;
    width: var(--cell);
    height: var(--cell);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .trail-inner {
    width: calc(var(--cell) - 8px);
    height: calc(var(--cell) - 8px);
    border-radius: 50%;
    background: rgba(0, 245, 255, 0.06);
  }

  .level-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 16px 0 12px;
    opacity: 0;
    animation: fadeSlideUp 0.8s ease-out 0.6s forwards;
  }

  .level-label {
    font-family: 'Orbitron', sans-serif;
    font-size: 9px;
    letter-spacing: 3px;
    color: var(--text-muted);
  }

  .level-track {
    flex: 1;
    height: 3px;
    background: rgba(255, 255, 255, 0.04);
    border-radius: 2px;
    overflow: hidden;
  }

  .level-fill {
    height: 100%;
    width: 65%;
    border-radius: 2px;
    background: linear-gradient(90deg, var(--neon-cyan), var(--neon-magenta));
    box-shadow: 0 0 10px rgba(0, 245, 255, 0.4);
  }

  .level-num {
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    font-weight: 700;
    color: var(--neon-cyan);
  }

  .controls {
    padding: 12px 0 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    opacity: 0;
    animation: fadeSlideUp 0.8s ease-out 0.7s forwards;
  }

  .controls-row {
    display: flex;
    gap: 6px;
  }

  .ctrl-btn {
    width: 62px;
    height: 62px;
    border-radius: 16px;
    background: var(--dark-card);
    border: 1px solid var(--glass-border);
    backdrop-filter: blur(10px);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.15s ease;
    color: var(--text-muted);
    font-size: 20px;
    position: relative;
    overflow: hidden;
  }

  .ctrl-glow {
    position: absolute;
    inset: 0;
    border-radius: 16px;
    background: radial-gradient(circle at center, rgba(0, 245, 255, 0.1), transparent 70%);
    opacity: 0;
    transition: opacity 0.3s ease;
    pointer-events: none;
  }

  .ctrl-btn:active {
    transform: scale(0.9);
    border-color: rgba(0, 245, 255, 0.3);
  }

  .ctrl-btn:active .ctrl-glow {
    opacity: 1;
  }

  .ctrl-btn:active svg {
    color: var(--neon-cyan);
    filter: drop-shadow(0 0 6px rgba(0, 245, 255, 0.5));
  }

  .ctrl-btn svg {
    width: 22px;
    height: 22px;
    transition: all 0.15s ease;
  }

  .ctrl-btn.spacer {
    visibility: hidden;
  }

  .bottom-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 8px 0 4px;
    gap: 24px;
    opacity: 0;
    animation: fadeSlideUp 0.8s ease-out 0.8s forwards;
  }

  .action-btn {
    padding: 10px 28px;
    border-radius: 12px;
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 3px;
    border: none;
    cursor: pointer;
    transition: all 0.3s ease;
  }

  .action-btn.primary {
    background: linear-gradient(135deg, var(--neon-cyan), #00b8d4);
    color: var(--dark-bg);
    box-shadow: 0 4px 20px rgba(0, 245, 255, 0.3);
  }

  .action-btn.primary:active {
    transform: scale(0.95);
    box-shadow: 0 2px 10px rgba(0, 245, 255, 0.5);
  }

  .action-btn.secondary {
    background: var(--glass);
    border: 1px solid var(--glass-border);
    color: var(--text-muted);
    backdrop-filter: blur(10px);
  }

  .pause-overlay {
    position: absolute;
    inset: 0;
    background: rgba(6, 6, 14, 0.85);
    backdrop-filter: blur(8px);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    border-radius: 18px;
    z-index: 20;
  }

  .pause-overlay.visible {
    display: flex;
  }

  .pause-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 24px;
    font-weight: 900;
    letter-spacing: 8px;
    background: linear-gradient(135deg, var(--neon-cyan), var(--neon-magenta));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .pause-subtitle {
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--text-muted);
  }

  @keyframes fadeSlideDown {
    from { opacity: 0; transform: translateY(-12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeSlideUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeScale {
    from { opacity: 0; transform: scale(0.95); }
    to { opacity: 1; transform: scale(1); }
  }

  @media (max-height: 700px) {
    .stats-bar { margin-bottom: 10px; }
    .stat-card { padding: 8px 12px; }
    .stat-value { font-size: 18px; }
    .ctrl-btn { width: 54px; height: 54px; }
    .level-bar { margin: 10px 0 8px; }
    .controls { padding: 8px 0 4px; }
  }

  @media (min-width: 421px) {
    :root { --cell: 22px; }
  }
</style>
</head>
<body>
  <div class="bg-gradient"></div>
  <div class="noise-overlay"></div>
  <div class="scanlines"></div>

  <div class="app">
    <div class="header">
      <div style="position:relative">
        <div class="logo">SERPENT</div>
        <div class="logo-glow" aria-hidden="true">SERPENT</div>
      </div>
      <div class="header-actions">
        <button class="icon-btn" aria-label="Leaderboard">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>
        </button>
        <button class="icon-btn" aria-label="Settings">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        </button>
      </div>
    </div>

    <div class="stats-bar">
      <div class="stat-card primary">
        <div class="stat-label">Score</div>
        <div class="stat-value">2,450</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Best</div>
        <div class="stat-value">8,120</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Length</div>
        <div class="stat-value">17</div>
      </div>
    </div>

    <div class="game-container">
      <div class="game-board-wrapper">
        <div class="game-board-wrapper-glow"></div>
        <div class="game-board" id="gameBoard">
          <div class="grid-overlay"></div>
          <div class="pause-overlay" id="pauseOverlay">
            <div class="pause-title">PAUSED</div>
            <div class="pause-subtitle">TAP TO RESUME</div>
          </div>
        </div>
      </div>
    </div>

    <div class="level-bar">
      <span class="level-label">LEVEL</span>
      <div class="level-track">
        <div class="level-fill"></div>
      </div>
      <span class="level-num">07</span>
    </div>

    <div class="controls">
      <div class="controls-row">
        <div class="ctrl-btn spacer"></div>
        <button class="ctrl-btn" aria-label="Up">
          <span class="ctrl-glow"></span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>
        </button>
        <div class="ctrl-btn spacer"></div>
      </div>
      <div class="controls-row">
        <button class="ctrl-btn" aria-label="Left">
          <span class="ctrl-glow"></span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <button class="ctrl-btn" aria-label="Down">
          <span class="ctrl-glow"></span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <button class="ctrl-btn" aria-label="Right">
          <span class="ctrl-glow"></span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>
    </div>

    <div class="bottom-bar">
      <button class="action-btn secondary" id="pauseBtn">&#9208;</button>
      <button class="action-btn primary">PLAY</button>
    </div>
  </div>

  <script>
    const board = document.getElementById('gameBoard');
    const cell = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--cell'));

    const snakePositions = [
      {x:9,y:8},{x:8,y:8},{x:7,y:8},{x:6,y:8},{x:5,y:8},
      {x:5,y:9},{x:5,y:10},{x:6,y:10},{x:7,y:10},{x:7,y:11},
      {x:7,y:12},{x:8,y:12},{x:9,y:12},{x:10,y:12},{x:10,y:11},
      {x:10,y:10},{x:11,y:10}
    ];

    const foodPos = {x: 13, y: 6};
    const trailPositions = [{x:12,y:10},{x:11,y:8},{x:4,y:8}];

    function createEl(className, parent) {
      const el = document.createElement('div');
      el.className = className;
      parent.appendChild(el);
      return el;
    }

    trailPositions.forEach(function(pos) {
      const el = createEl('trail', board);
      el.style.left = pos.x * cell + 'px';
      el.style.top = pos.y * cell + 'px';
      createEl('trail-inner', el);
    });

    snakePositions.forEach(function(pos, i) {
      const type = i === 0 ? 'head' : i === snakePositions.length - 1 ? 'tail' : 'body';
      const el = createEl('snake-segment ' + type, board);
      el.style.left = pos.x * cell + 'px';
      el.style.top = pos.y * cell + 'px';
      const inner = createEl('snake-inner', el);
      if (type === 'body') {
        inner.style.opacity = String(0.85 - (i / snakePositions.length) * 0.45);
      }
    });

    const foodEl = createEl('food', board);
    foodEl.style.left = foodPos.x * cell + 'px';
    foodEl.style.top = foodPos.y * cell + 'px';
    createEl('food-inner', foodEl);

    document.getElementById('pauseBtn').addEventListener('click', function() {
      document.getElementById('pauseOverlay').classList.toggle('visible');
    });
  </script>
</body>
</html>
